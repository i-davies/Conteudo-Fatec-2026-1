name: Publish to GitHub Pages

run-name: "Pages - ${{ github.ref_name }}"

on:
  push:
    branches:
      - main
      - feature/**

permissions:
  contents: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Build site
        run: uv run mkdocs build

      - name: Compute preview directory
        if: startsWith(github.ref, 'refs/heads/feature/')
        id: preview_dir
        shell: bash
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          SAFE_BRANCH_NAME="$(echo "${BRANCH_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')"
          echo "value=previews/${SAFE_BRANCH_NAME}" >> "$GITHUB_OUTPUT"

      - name: Deploy production site (main)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          keep_files: true

      - name: Deploy preview site (feature)
        if: startsWith(github.ref, 'refs/heads/feature/')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          destination_dir: ${{ steps.preview_dir.outputs.value }}
          keep_files: true

      - name: Publish deployment summary
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"

          if [ "$REPO" = "${OWNER}.github.io" ]; then
            BASE_URL="https://${OWNER}.github.io/"
          else
            BASE_URL="https://${OWNER}.github.io/${REPO}/"
          fi

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            FINAL_URL="$BASE_URL"
            LABEL="Producao"
          else
            FINAL_URL="${BASE_URL}${{ steps.preview_dir.outputs.value }}/"
            LABEL="Preview"
          fi

          {
            echo "## Deployment publicado"
            echo ""
            echo "- Tipo: ${LABEL}"
            echo "- Branch: ${GITHUB_REF_NAME}"
            echo "- URL: ${FINAL_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Deployment URL: ${FINAL_URL}"
