name: Cleanup Pages Preview

on:
  delete:

permissions:
  contents: write

jobs:
  cleanup-preview:
    if: github.event.ref_type == 'branch' && startsWith(github.event.ref, 'feature/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Compute preview directory
        id: preview_dir
        shell: bash
        run: |
          BRANCH_NAME="${{ github.event.ref }}"
          SAFE_BRANCH_NAME="$(echo "${BRANCH_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')"
          echo "value=previews/${SAFE_BRANCH_NAME}" >> "$GITHUB_OUTPUT"

      - name: Remove preview directory
        shell: bash
        run: |
          TARGET_DIR="${{ steps.preview_dir.outputs.value }}"
          if [ -d "$TARGET_DIR" ]; then
            rm -rf "$TARGET_DIR"
            echo "Removed $TARGET_DIR"
          else
            echo "Directory not found: $TARGET_DIR"
          fi

      - name: Commit and push cleanup
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove pages preview for deleted branch ${{ github.event.ref }}"
          git push origin gh-pages
